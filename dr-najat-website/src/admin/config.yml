# ============================================================
# Decap CMS Configuration — Dr Najat Amharar
# ============================================================
# This file tells the CMS which files it can edit.
# When your friend logs in at yoursite.com/admin, she'll see
# a visual editor for all the content defined below.
# ============================================================

backend:
  name: git-gateway
  branch: main   # The GitHub branch to commit edits to

# Enable the editorial workflow (draft → review → publish)
# Remove or comment out if you want immediate publishing:
# publish_mode: editorial_workflow

media_folder: "src/images"       # Where uploaded images are stored
public_folder: "/images"         # How images are referenced in HTML

# ============================================================
# COLLECTIONS — each collection is a section your friend can edit
# ============================================================

collections:

  # ----------------------------------------------------------
  # SITE SETTINGS — global info used across all pages
  # ----------------------------------------------------------
  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - label: "Global Settings"
        name: "global"
        file: "src/_data/settings.json"
        fields:
          - { label: "Doctor's Name", name: "doctor_name", widget: "string", hint: "e.g. Dr Najat Amharar" }
          - { label: "Subtitle / Specialty", name: "subtitle", widget: "string", hint: "e.g. Functional Medicine" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Location", name: "location", widget: "string", hint: "e.g. London (online worldwide)" }
          - { label: "Footer Tagline", name: "footer_tagline", widget: "text", hint: "Short sentence in the footer" }
          - label: "Social Media Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }

  # ----------------------------------------------------------
  # HOME PAGE
  # ----------------------------------------------------------
  - name: "home"
    label: "🏠 Home Page"
    files:

      - label: "Home Page Content"
        name: "home"
        file: "src/_data/home.json"
        fields:

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline (small text)", name: "tagline", widget: "string", hint: "e.g. Functional Medicine · Root-Cause Care" }
              - { label: "Main Headline Line 1", name: "headline_1", widget: "string", hint: "e.g. Heal from within." }
              - { label: "Main Headline Line 2", name: "headline_2", widget: "string", hint: "e.g. Live fully." }
              - { label: "Hero Text", name: "text", widget: "text" }
              - { label: "Primary Button Text", name: "btn_primary_text", widget: "string" }
              - { label: "Primary Button Link", name: "btn_primary_link", widget: "string" }
              - { label: "Secondary Button Text", name: "btn_secondary_text", widget: "string" }
              - { label: "Secondary Button Link", name: "btn_secondary_link", widget: "string" }
              - { label: "Hero Image", name: "image", widget: "image", required: false }

          - label: "Stats Bar"
            name: "stats"
            widget: "list"
            max: 4
            fields:
              - { label: "Number", name: "number", widget: "string", hint: "e.g. 12+ or 98%" }
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Years of Practice" }

          - label: "About Snippet"
            name: "about_snippet"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Lead Text", name: "lead", widget: "text" }
              - { label: "Body Text", name: "body", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Years Badge (number)", name: "badge_number", widget: "string" }
              - { label: "Years Badge (label)", name: "badge_label", widget: "string" }

          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            max: 3
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Author (name and age)", name: "author", widget: "string", hint: "e.g. Sarah M., 38" }

  # ----------------------------------------------------------
  # ABOUT PAGE
  # ----------------------------------------------------------
  - name: "about"
    label: "👩‍⚕️ About Page"
    files:

      - label: "About Page Content"
        name: "about"
        file: "src/_data/about.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Page Subheadline", name: "subheadline", widget: "string" }
          - { label: "Doctor Photo", name: "photo", widget: "image", required: false }
          - { label: "Story Heading", name: "story_heading", widget: "string" }
          - { label: "Story Intro (lead text)", name: "story_lead", widget: "text" }
          - { label: "Story Paragraphs", name: "story_body", widget: "markdown" }
          - { label: "Highlighted Quote", name: "highlight_quote", widget: "text" }

          - label: "Training Timeline"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Year / Credential Code", name: "year", widget: "string", hint: "e.g. IFMCP or 2015" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Areas of Expertise"
            name: "expertise"
            widget: "list"
            fields:
              - { label: "Condition", name: "condition", widget: "string" }

  # ----------------------------------------------------------
  # SERVICES PAGE
  # ----------------------------------------------------------
  - name: "services"
    label: "💼 Services Page"
    files:

      - label: "Services Page Content"
        name: "services"
        file: "src/_data/services.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Page Introduction", name: "intro", widget: "text" }

          - label: "Services"
            name: "services_list"
            widget: "list"
            fields:
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Eyebrow Label", name: "eyebrow", widget: "string", hint: "e.g. Step 1 or Speciality" }
              - { label: "Description (short)", name: "description", widget: "text" }
              - { label: "Extra Detail", name: "detail", widget: "text", required: false }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. £295" }
              - { label: "Price Label", name: "price_label", widget: "string", hint: "e.g. / 90-minute consultation" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - label: "Included Items"
                name: "includes"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

          - label: "Pricing Packages"
            name: "packages"
            widget: "list"
            max: 3
            fields:
              - { label: "Package Name", name: "name", widget: "string" }
              - { label: "Duration", name: "duration", widget: "string", hint: "e.g. 3-Month Programme" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. £895" }
              - { label: "Price Note", name: "price_note", widget: "string", hint: "e.g. + initial consultation" }
              - { label: "Featured (most popular)?", name: "featured", widget: "boolean", default: false }
              - label: "What's Included"
                name: "includes"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }

  # ----------------------------------------------------------
  # CONTACT PAGE
  # ----------------------------------------------------------
  - name: "contact"
    label: "📬 Contact Page"
    files:

      - label: "Contact Page Content"
        name: "contact"
        file: "src/_data/contact.json"
        fields:
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Page Subheadline", name: "subheadline", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Calendly / Booking Link (optional)", name: "booking_link", widget: "string", required: false, hint: "Paste your Calendly URL here" }

          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

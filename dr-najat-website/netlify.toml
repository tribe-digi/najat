# ============================================================
# Netlify Configuration — Dr Najat Amharar Website
# ============================================================

[build]
  # This is a plain static site — no build step needed
  # Just publish the src folder directly
  publish = "src"

# ============================================================
# Netlify Identity — required for the CMS login
# ============================================================
# The CMS admin lives at /admin
# Netlify Identity handles the login

# ============================================================
# Form handling — Netlify detects the contact form automatically
# ============================================================

# ============================================================
# Redirects
# ============================================================
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# ============================================================
# Security Headers
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
